items:
  - id: CP-001
    title: "Expose promotion pipeline as a Rust library API"
    description: >
      cargo-promote is currently CLI-only. A stable lib surface would allow
      downstream crates (e.g. release orchestrators) to drive pipelines
      programmatically. The promote! macro (docs/ideas.md) depends on this.
    priority: P2
    status: open
    files:
      - src/lib.rs
      - docs/ideas.md

  - id: CP-002
    title: "Expose Tailscale funnel / public endpoint for cratebox"
    description: >
      GitHub Actions release workflows are blocked because the Gitea registry
      is Tailscale-only. Expose via Tailscale funnel or Caddy reverse proxy to
      re-enable CI-driven publishes.
    priority: P2
    status: open
    files:
      - CLAUDE.md

